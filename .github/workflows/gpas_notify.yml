name: GPAS Daily Notification

on:
  # Run every day at 6:00 AM Eastern (11:00 UTC)
  # Prefer to run at 7am, but github delays on free plan mean 6am will actually be closer to 7am.
  schedule:
    - cron: "0 11 * * *"    # 6:00 AM ET (morning check)
    
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_daily:
        description: "Send email even if no alerts (daily digest)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # Restore cached seen-records so we don't re-alert on old entries
      - name: Restore seen records cache
        uses: actions/cache@v4
        with:
          path: data/seen_records.json
          key: gpas-seen-records-${{ runner.os }}
          restore-keys: |
            gpas-seen-records-

      - name: Run GPAS notifier
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FORCE_DAILY: ${{ github.event.inputs.force_daily || 'false' }}
        run: python spray_notify.py

      # Save updated seen records back to cache
      - name: Save seen records cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/seen_records.json
          key: gpas-seen-records-${{ runner.os }}
