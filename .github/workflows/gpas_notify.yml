name: GPAS Daily Notification
on:
  # Run every day at 5 AM Eastern (10 UTC)
  # Prefer to run at 7am, but github delays on free plan mean 5am will actually be closer to 7am.
  schedule:
    - cron: "30 10 * * *"   # # 5 AM ET (morning check- likely to run at 7-8am due to morning delays) — full morning digest
    - cron: "0 12 * * *"    # ~7:00 AM ET — new sprays only
    - cron: "0 13 * * *"    # ~8:00 AM ET — new sprays only
    - cron: "0 14 * * *"    # ~9:00 AM ET — new sprays only (remember github may have delays)
    - cron: "0 15 * * *"    # ~10:00 AM ET — new sprays only
    - cron: "0 16 * * *"    # ~11:00 AM ET — new sprays only
    - cron: "0 17 * * *"    # ~12:00 PM ET — new sprays only
    - cron: "0 18 * * *"    # ~1:00 PM ET — new sprays only
    - cron: "0 19 * * *"    # ~2:00 PM ET — new sprays only
    - cron: "0 20 * * *"    # ~3:00 PM ET — new sprays only
    - cron: "0 21 * * *"    # ~4:00 PM ET — new sprays only
    - cron: "0 22 * * *"    # ~5:00 PM ET — new sprays only
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_daily:
        description: "Send email even if no alerts (daily digest)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      slack_enabled:
        description: "Send Slack notification"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run GPAS notifier
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}          
          SLACK_ENABLED: ${{ github.event.inputs.slack_enabled || 'true' }}
          FORCE_DAILY: ${{ github.event.inputs.force_daily || 'false' }}
        run: python spray_notify.py

      - name: Save seen records to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/seen_records.json
          git diff --staged --quiet || git commit -m "Update seen records"
          git push
