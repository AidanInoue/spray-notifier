name: GPAS Daily Notification
on:
  # Run every day at 5:30 AM Eastern (10:30 UTC)
  # Prefer to run at 7am, but github delays on free plan mean 5:30am will actually be closer to 7am.
  schedule:
    - cron: "30 10 * * *"    # 5:30 AM ET (morning check)
    
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_daily:
        description: "Send email even if no alerts (daily digest)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      slack_enabled:
        description: "Send Slack notification"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run GPAS notifier
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}          
          SLACK_ENABLED: ${{ github.event.inputs.slack_enabled || 'true' }}
          FORCE_DAILY: ${{ github.event.inputs.force_daily || 'false' }}
        run: python spray_notify.py

      - name: Save seen records to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/seen_records.json
          git diff --staged --quiet || git commit -m "Update seen records"
          git push
